<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casano — Offline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #FDFBF7;
      color: #2A2B2A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, #C1492E, #a03a22);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 32px rgba(193, 73, 46, 0.25);
    }
    .icon svg { width: 40px; height: 40px; color: white; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    p {
      color: #5A5B5A;
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 1.5rem;
    }
    .retry-btn {
      background: #C1492E;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .retry-btn:hover { background: #A63C25; transform: translateY(-1px); }
    .retry-btn:active { transform: translateY(0); }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01" />
    </svg>
  </div>
  <h1>You're Offline</h1>
  <p>No internet connection. Check your network and try again — your cart is safely saved!</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <p class="pulse" style="margin-top: 2rem; font-size: 0.75rem; color: #9A9B9A;">
    Casano — India's Last Minute App
  </p>
</body>
</html>
